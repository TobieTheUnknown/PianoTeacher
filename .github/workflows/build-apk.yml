name: Build APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Set NDK environment
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Android project
        run: npx tauri android init

      - name: Copy custom Android sources
        run: |
          GEN_JAVA_DIR="src-tauri/gen/android/app/src/main/java/com/pianoteacher/app"
          mkdir -p "$GEN_JAVA_DIR"
          cp src-tauri/android/src/main/java/com/pianoteacher/app/MidiHelper.kt "$GEN_JAVA_DIR/"

          GEN_MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$GEN_MANIFEST" ] && ! grep -q "android.hardware.usb.host" "$GEN_MANIFEST"; then
            sed -i 's|</manifest>|    <uses-feature android:name="android.hardware.usb.host" android:required="false" />\n    <uses-feature android:name="android.software.midi" android:required="false" />\n</manifest>|' "$GEN_MANIFEST"
          fi

      - name: Build APK
        run: npx tauri android build --apk true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: piano-teacher-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 7
