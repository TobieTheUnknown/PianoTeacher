name: Piano Teacher v2 — Android Build

on:
  push:
    branches: [ main ]
    paths:
      - 'piano-teacher-v2/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'piano-teacher-v2/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK 27
        run: sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('piano-teacher-v2/**/*.gradle.kts', 'piano-teacher-v2/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        working-directory: piano-teacher-v2
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: piano-teacher-v2-debug
          path: piano-teacher-v2/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
