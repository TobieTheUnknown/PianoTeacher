name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Sign APK
        run: |
          # Decode keystore
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 --decode > /tmp/keystore.p12

          # Find unsigned APK
          UNSIGNED=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Signing: $UNSIGNED"

          # Sign with apksigner
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools/ | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks /tmp/keystore.p12 \
            --ks-type PKCS12 \
            --ks-pass "pass:${{ secrets.SIGNING_KEY_STORE_PASSWORD }}" \
            --ks-key-alias "${{ secrets.SIGNING_KEY_ALIAS }}" \
            --key-pass "pass:${{ secrets.SIGNING_KEY_PASSWORD }}" \
            --out android/app/build/outputs/apk/release/piano-practice-${{ github.ref_name }}.apk \
            "$UNSIGNED"

          echo "Signed APK:"
          ls -lh android/app/build/outputs/apk/release/piano-practice-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Piano Practice ${{ github.ref_name }}
          body: |
            ## Piano Practice ${{ github.ref_name }}

            ### Installation
            Télécharge `piano-practice-${{ github.ref_name }}.apk` ci-dessous et installe-le sur ton Android (active "Sources inconnues" si besoin).
          files: android/app/build/outputs/apk/release/piano-practice-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
