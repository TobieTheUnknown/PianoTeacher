<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0c10" />
    <title>Piano Teacher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Pre-React splash: paints instantly with the brand background so there is
         never a white flash before the bundle mounts. Removed by main.jsx. -->
    <style>
      html, body { background: #0a0c10; }
      #__splash {
        position: fixed; inset: 0; z-index: 9000;
        display: flex; align-items: center; justify-content: center;
        background: #0a0c10;
        opacity: 1; transition: opacity 320ms cubic-bezier(0.16,1,0.3,1);
        pointer-events: none;
      }
      #__splash.is-hidden { opacity: 0; }
      #__splash svg {
        width: 132px; height: 132px;
        animation: __splash-pop 520ms cubic-bezier(0.16,1,0.3,1) both;
      }
      @keyframes __splash-pop {
        from { transform: scale(0.92); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #__splash svg { animation: none; }
        #__splash { transition: none; }
      }
    </style>
    <div id="__splash" aria-hidden="true">
      <svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="s_tile" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#141821"/><stop offset="1" stop-color="#0a0c10"/></linearGradient>
          <linearGradient id="s_cyan" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
          <linearGradient id="s_pink" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
          <linearGradient id="s_beam" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
        </defs>
        <rect x="0" y="0" width="1024" height="1024" rx="205" ry="205" fill="url(#s_tile)"/>
        <rect x="6" y="6" width="1012" height="1012" rx="200" ry="200" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>
        <rect x="168" y="430" width="94" height="372" rx="28" fill="#e8eaf0"/>
        <rect x="266" y="430" width="94" height="372" rx="28" fill="url(#s_pink)"/>
        <rect x="364" y="430" width="94" height="372" rx="28" fill="#e8eaf0"/>
        <rect x="462" y="430" width="94" height="372" rx="28" fill="#e8eaf0"/>
        <rect x="560" y="430" width="94" height="372" rx="28" fill="#e8eaf0"/>
        <rect x="658" y="430" width="94" height="372" rx="28" fill="url(#s_cyan)"/>
        <rect x="756" y="430" width="94" height="372" rx="28" fill="#e8eaf0"/>
        <g fill="#0a0c10">
          <rect x="244" y="430" width="58" height="226" rx="20"/>
          <rect x="342" y="430" width="58" height="226" rx="20"/>
          <rect x="538" y="430" width="58" height="226" rx="20"/>
          <rect x="636" y="430" width="58" height="226" rx="20"/>
          <rect x="734" y="430" width="58" height="226" rx="20"/>
        </g>
        <g>
          <path d="M330 214 L700 150 L700 210 L330 274 Z" fill="url(#s_beam)"/>
          <rect x="330" y="214" width="32" height="132" rx="14" fill="url(#s_beam)"/>
          <rect x="668" y="150" width="32" height="132" rx="14" fill="url(#s_beam)"/>
          <ellipse cx="322" cy="340" rx="54" ry="42" transform="rotate(-14 322 340)" fill="#ec4899"/>
          <ellipse cx="684" cy="276" rx="54" ry="42" transform="rotate(-14 684 276)" fill="#22d3ee"/>
        </g>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      // Error trap — catches crashes BEFORE React/modules load
      // Shows error on screen instead of black screen (critical for Android debugging)
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('__error_trap');
        if (!el) {
          el = document.createElement('pre');
          el.id = '__error_trap';
          el.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#1a0000;color:#ff6b6b;padding:1rem;font-size:12px;overflow:auto;white-space:pre-wrap;word-break:break-all;';
          document.body.appendChild(el);
        }
        el.textContent += '[ERROR] ' + msg + '\n  at ' + src + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '') + '\n\n';
      };
      window.onunhandledrejection = function(e) {
        var reason = e.reason || {};
        var msg = reason.message || reason.toString ? reason.toString() : String(reason);
        window.onerror('[UnhandledRejection] ' + msg, '', 0, 0, reason);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
