name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        working-directory: piano-teacher-v2
        run: gradle assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: piano-teacher-v2/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Rename signed APK
        run: |
          mv "${{ steps.sign_apk.outputs.signedReleaseFile }}" \
             piano-teacher-v2/app/build/outputs/apk/release/piano-practice-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Piano Practice ${{ github.ref_name }}
          body: |
            ## Piano Practice ${{ github.ref_name }}

            ### Installation
            Télécharge `piano-practice-${{ github.ref_name }}.apk` ci-dessous et installe-le sur ton Android (active "Sources inconnues" si besoin).
          files: piano-teacher-v2/app/build/outputs/apk/release/piano-practice-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
